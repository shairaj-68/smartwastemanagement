services:
  mongo:
    image: mongo:7
    container_name: swm-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
    container_name: swm-backend
    depends_on:
      - mongo
    environment:
      NODE_ENV: development
      PORT: 5000
      CLIENT_ORIGIN: http://localhost:5173
      MONGO_URI: mongodb://mongo:27017/swm
      JWT_ACCESS_SECRET: replace-me
      JWT_REFRESH_SECRET: replace-me
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
    ports:
      - "5000:5000"

volumes:
  mongo-data:
